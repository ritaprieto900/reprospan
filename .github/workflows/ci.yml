name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with: { toolchain: "1.88", components: "rustfmt,clippy" }
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  replay:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with: { toolchain: "1.88" }
      - name: offline replay regression
        run: |
          cargo run -p reprospan-cli -- replay \
            --db /tmp/ci-replay.sqlite \
            --bundle packages/contracts/fixtures/v1/failed-tool-run.bundle.json \
            --patch packages/contracts/fixtures/v1/fix-tool-result.patch.json \
            --eval packages/contracts/fixtures/v1/fix-tool-result.eval.json
