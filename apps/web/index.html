<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reprospan Timeline</title>
<style>
  :root {
    --bg: #1a1a1c;
    --surface: #212124;
    --border: #2d2d31;
    --text: #dddddf;
    --muted: #8e8e92;
    --faint: #5e5e62;
    --accent: #e8a838;
    --error: #c94a4a;
    --ok: #4a9e6e;
    --pending: #5e6e8e;
    --gap: 1rem;
    --radius: 0px;
    font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--gap) calc(var(--gap) * 2);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: inherit;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header .status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ok);
  }

  header .dot.disconnected { background: var(--error); }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  aside {
    width: 340px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .bundle-list {
    flex: 1;
    overflow-y: auto;
  }

  .bundle-item {
    padding: var(--gap) calc(var(--gap) * 1.5);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .bundle-item:hover { background: rgba(255,255,255,0.03); }
  .bundle-item.active { background: rgba(232,168,56,0.08); }

  .bundle-item .id {
    color: var(--accent);
    word-break: break-all;
  }

  .bundle-item .meta {
    color: var(--muted);
    font-size: 0.85em;
    margin-top: 0.25rem;
  }

  .bundle-item .badge {
    display: inline-block;
    padding: 0.12em 0.5em;
    background: var(--border);
    font-size: 0.8em;
    margin-top: 0.35rem;
  }

  .bundle-item .badge.failed { background: rgba(201,74,74,0.18); color: var(--error); }
  .bundle-item .badge.completed { background: rgba(74,158,110,0.18); color: var(--ok); }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--faint);
    font-size: 0.9em;
    letter-spacing: 0.03em;
  }

  .timeline-view {
    flex: 1;
    overflow-y: auto;
    padding: calc(var(--gap) * 2);
  }

  .timeline-view h2 {
    font-size: inherit;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: var(--gap);
  }

  .event-row {
    position: relative;
    padding: 0.75rem 0 0.75rem 2rem;
    border-left: 1px solid var(--border);
  }

  .event-row:last-child { border-left-color: transparent; }

  .event-row::before {
    content: "";
    position: absolute;
    left: -4px;
    top: 0.9rem;
    width: 8px;
    height: 8px;
    background: var(--pending);
  }

  .event-row.status-ok::before { background: var(--ok); }
  .event-row.status-error::before { background: var(--error); }

  .event-kind {
    color: var(--accent);
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .event-id {
    color: var(--muted);
    margin-left: 0.5rem;
  }

  .event-name {
    display: block;
    margin-top: 0.15rem;
    color: var(--text);
  }

  .event-output {
    margin-top: 0.35rem;
    padding: 0.5rem;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 0.9em;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .event-parent {
    font-size: 0.8em;
    color: var(--faint);
    margin-top: 0.25rem;
  }

  .diff-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: calc(var(--gap) * 1.5);
    font-size: 0.9em;
  }

  .diff-table th {
    text-align: left;
    padding: 0.4rem 0.6rem;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 0.85em;
    letter-spacing: 0.04em;
  }

  .diff-table td {
    padding: 0.35rem 0.6rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: top;
  }

  .diff-table .field { color: var(--muted); }
  .diff-table .before { color: var(--error); text-decoration: line-through; }
  .diff-table .after { color: var(--ok); }

  .stat-row {
    display: flex;
    gap: calc(var(--gap) * 3);
    margin-bottom: var(--gap);
  }

  .stat-label { color: var(--muted); font-size: 0.8em; }
  .stat-value { color: var(--text); }

  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-bar button {
    background: none;
    border: none;
    color: var(--muted);
    font: inherit;
    font-size: 0.85em;
    padding: 0.5rem calc(var(--gap) * 1.5);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.12s ease, border-color 0.12s ease;
  }

  .tab-bar button:hover { color: var(--text); }
  .tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }

  .connect-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: var(--gap);
    border-bottom: 1px solid var(--border);
  }

  .connect-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font: inherit;
    font-size: 0.85em;
    padding: 0.35rem 0.5rem;
    outline: none;
  }

  .connect-row input:focus { border-color: var(--accent); }

  .connect-row button {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font: inherit;
    font-size: 0.85em;
    font-weight: 600;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
  }

  .diff-upload {
    display: flex;
    gap: var(--gap);
    padding: var(--gap) calc(var(--gap) * 2);
    border-bottom: 1px solid var(--border);
  }

  .diff-upload label {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    padding: calc(var(--gap) * 1.5);
    border: 2px dashed var(--border);
    cursor: pointer;
    color: var(--muted);
    font-size: 0.8em;
    transition: border-color 0.12s ease, color 0.12s ease;
  }

  .diff-upload label:hover { border-color: var(--accent); color: var(--accent); }
  .diff-upload label.loaded { border-color: var(--ok); border-style: solid; }
  .diff-upload input[type=file] { display: none; }

  .diff-view {
    flex: 1;
    overflow-y: auto;
    padding: calc(var(--gap) * 2);
  }

  .diff-view h2 { font-size: inherit; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: var(--gap); }

  .diff-card {
    border: 1px solid var(--border);
    margin-bottom: var(--gap);
    padding: var(--gap);
  }

  .diff-card .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .diff-card .event-kind { color: var(--accent); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; }

  .diff-card .tag {
    display: inline-block;
    padding: 0.1em 0.4em;
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .diff-card .tag.changed { background: rgba(232,168,56,0.15); color: var(--accent); }

  .diff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .diff-grid .col-header {
    background: var(--surface);
    padding: 0.25rem 0.5rem;
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  .diff-grid .cell {
    background: var(--bg);
    padding: 0.4rem 0.5rem;
    font-size: 0.85em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .diff-grid .cell.old { background: rgba(201,74,74,0.06); color: var(--error); }
  .diff-grid .cell.new { background: rgba(74,158,110,0.06); color: var(--ok); }

  .meta-compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    margin-bottom: var(--gap);
  }

  .meta-compare .col-header {
    background: var(--surface);
    padding: 0.25rem 0.5rem;
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  .meta-compare .cell {
    background: var(--bg);
    padding: 0.3rem 0.5rem;
    font-size: 0.8em;
    word-break: break-all;
  }
</style>
</head>
<body>
<header>
  <h1>Reprospan ・ Timeline</h1>
  <span class="status"><span class="dot" id="health-dot"></span><span id="health-text">—</span></span>
</header>
<main>
  <aside>
    <div class="connect-row">
      <input id="server-url" type="text" value="http://127.0.0.1:8787" placeholder="http://127.0.0.1:8787">
      <button id="connect-btn">Connect</button>
    </div>
    <div class="bundle-list" id="bundle-list"></div>
  </aside>
  <section class="panel" id="panel">
    <div class="tab-bar" id="tab-bar">
      <button class="active" data-tab="timeline">Timeline</button>
      <button data-tab="diff">Diff</button>
    </div>
    <div id="panel-body" class="placeholder">Select a bundle to inspect</div>
  </section>
</main>
<script type="module">
const serverInput = document.getElementById("server-url");
const connectBtn = document.getElementById("connect-btn");
const healthDot = document.getElementById("health-dot");
const healthText = document.getElementById("health-text");
const bundleList = document.getElementById("bundle-list");
const panelBody = document.getElementById("panel-body");
const tabBar = document.getElementById("tab-bar");

let base = "";
let bundles = [];
let activeBundle = null;
let beforeBundle = null;
let afterBundle = null;

async function health() {
  try {
    const r = await fetch(`${base}/healthz`);
    if (r.ok) { const j = await r.json(); return j; }
  } catch (_) {}
  return null;
}

async function fetchJson(path) {
  const r = await fetch(`${base}${path}`);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

async function connect() {
  base = serverInput.value.trim().replace(/\/$/, "");
  healthDot.className = "dot";
  healthText.textContent = "connecting…";
  const h = await health();
  if (h) {
    healthDot.className = "dot";
    healthText.textContent = `${h.api_version} / ${h.contract_version}`;
    await refreshBundles();
  } else {
    healthDot.className = "dot disconnected";
    healthText.textContent = "unreachable";
  }
}

async function refreshBundles() {
  try {
    const r = await fetch(`${base}/v1/bundles`);
    if (!r.ok) return;
    bundles = await r.json();
    renderBundleList();
  } catch (_) {}
}

function renderBundleList() {
  let html = "";
  for (const b of bundles) {
    html += `<div class="bundle-item" onclick="document.dispatchEvent(new CustomEvent('select-bundle',{detail:'${b.bundle_id}'}))">`;
    html += `<div class="id">${escapeHtml(b.bundle_id)}</div>`;
    html += `<div class="meta">${b.created_at}</div>`;
    html += `</div>`;
  }
  if (!html) html = `<div style="padding:var(--gap);color:var(--muted);font-size:0.85em">No bundles imported</div>`;
  bundleList.innerHTML = html;
}

document.addEventListener("select-bundle", (e) => loadBundle(e.detail));

serverInput.addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });
connectBtn.addEventListener("click", connect);

async function loadBundle(bundleId) {
  activeBundle = await fetchJson(`/v1/bundles/${encodeURIComponent(bundleId)}/timeline`);
  switchTab("timeline");
}

function switchTab(tab) {
  tabBar.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  if (tab === "timeline") {
    if (activeBundle) renderTimeline();
    else panelBody.innerHTML = '<div class="placeholder">Select a bundle to inspect</div>';
  } else {
    beforeBundle ??= activeBundle;
    renderDiff();
  }
}

tabBar.querySelectorAll("button").forEach(b => {
  b.addEventListener("click", () => switchTab(b.dataset.tab));
});

function renderTimeline() {
  const bundle = activeBundle;
  if (!bundle) { panelBody.innerHTML = '<div class="placeholder">No bundle loaded</div>'; return; }
  const last = bundle.events[bundle.events.length - 1];
  const verdict = last.kind === "run.failed" ? "failed" : "completed";

  let html = `<div class="timeline-view">`;
  html += `<h2>Bundle ${escapeHtml(bundle.bundle_id)}</h2>`;
  html += `<div class="stat-row">
    <div><div class="stat-label">Created</div><div class="stat-value">${bundle.created_at}</div></div>
    <div><div class="stat-label">Events</div><div class="stat-value">${bundle.events.length}</div></div>
    <div><div class="stat-label">Verdict</div><div class="stat-value" style="color:${verdict==='failed'?'var(--error)':'var(--ok)'}">${verdict}</div></div>
    <div><div class="stat-label">Policy</div><div class="stat-value">${bundle.capture_policy.mode} · redacted=${bundle.capture_policy.redacted}</div></div>
  </div>`;

  for (const event of bundle.events) {
    html += `<div class="event-row status-${event.status}">`;
    html += `<span class="event-kind">${event.kind}</span><span class="event-id">${event.event_id}</span>`;
    if (event.name) html += `<span class="event-name">${event.name}</span>`;
    if (event.output) {
      html += `<div class="event-output">${escapeHtml(JSON.stringify(event.output, null, 2))}</div>`;
    }
    if (event.parent_event_id) {
      html += `<div class="event-parent">← parent: ${event.parent_event_id}</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  panelBody.className = "";
  panelBody.innerHTML = html;
}

function renderDiff() {
  if (!beforeBundle || !afterBundle) {
    panelBody.className = "";
    panelBody.innerHTML = `<div class="diff-view"><div class="diff-upload">
      <label id="drop-before" class="${beforeBundle?'loaded':''}">
        <span>${beforeBundle?'✓ Loaded':'Drop before.json'}</span>
        <span style="font-size:0.7em;color:var(--faint)">${beforeBundle ? beforeBundle.bundle_id : 'or click to select file'}</span>
        <input type="file" accept=".json" id="file-before">
      </label>
      <label id="drop-after" class="${afterBundle?'loaded':''}">
        <span>${afterBundle?'✓ Loaded':'Drop after.json'}</span>
        <span style="font-size:0.7em;color:var(--faint)">${afterBundle ? afterBundle.bundle_id : 'or click to select file'}</span>
        <input type="file" accept=".json" id="file-after">
      </label>
    </div></div>`;
    setupUploads();
    return;
  }

  const before = beforeBundle, after = afterBundle;
  const changed = [];
  let unchanged = 0;

  for (let i = 0; i < Math.min(before.events.length, after.events.length); i++) {
    const be = before.events[i], ae = after.events[i];
    if (be.event_id !== ae.event_id || be.kind !== ae.kind) {
      changed.push({ event_id: be.event_id, kind: be.kind, identity: true, be, ae });
      continue;
    }
    const diffs = [];
    if (be.status !== ae.status) diffs.push({ field: "status", before: be.status, after: ae.status });
    const bo = JSON.stringify(be.output || null), ao = JSON.stringify(ae.output || null);
    if (bo !== ao) diffs.push({ field: "output", before: bo === "null" ? "—" : JSON.stringify(be.output, null, 2), after: ao === "null" ? "—" : JSON.stringify(ae.output, null, 2) });
    if (diffs.length) changed.push({ event_id: be.event_id, kind: be.kind, diffs, be, ae });
    else unchanged++;
  }

  let html = `<div class="diff-view">`;
  html += `<h2>Diff: ${escapeHtml(before.bundle_id)}</h2>`;
  html += `<div class="stat-row">
    <div><div class="stat-label">Changed</div><div class="stat-value" style="color:var(--accent)">${changed.length} events</div></div>
    <div><div class="stat-label">Unchanged</div><div class="stat-value">${unchanged} events</div></div>
  </div>`;

  for (const c of changed) {
    html += `<div class="diff-card">`;
    html += `<div class="header"><span class="event-kind">${c.kind}</span><span class="event-id">${c.event_id}</span><span class="tag changed">changed</span></div>`;
    if (c.identity) {
      html += `<div style="color:var(--error);font-size:0.85em">Event identity differs — cannot compare fields</div>`;
    } else {
      html += `<div class="diff-grid">`;
      html += `<div class="col-header">Before</div><div class="col-header">After</div>`;
      for (const d of c.diffs) {
        html += `<div class="cell old">${escapeHtml(String(d.before))}</div>`;
        html += `<div class="cell new">${escapeHtml(String(d.after))}</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  panelBody.className = "";
  panelBody.innerHTML = html;
}

function setupUploads() {
  const dropBefore = document.getElementById("drop-before");
  const dropAfter = document.getElementById("drop-after");
  const fileBefore = document.getElementById("file-before");
  const fileAfter = document.getElementById("file-after");
  if (!dropBefore || !fileBefore) return;

  function handleDrop(el, fileInput, setter) {
    el.addEventListener("dragover", e => { e.preventDefault(); });
    el.addEventListener("drop", e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try { setter(JSON.parse(reader.result)); renderDiff(); }
        catch (err) { alert("Invalid JSON: " + err.message); }
      };
      reader.readAsText(file);
    });
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try { setter(JSON.parse(reader.result)); renderDiff(); }
        catch (err) { alert("Invalid JSON: " + err.message); }
      };
      reader.readAsText(file);
    });
  }

  handleDrop(dropBefore, fileBefore, (b) => { beforeBundle = b; });
  handleDrop(dropAfter, fileAfter, (b) => { afterBundle = b; });
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

connect();
</script>
</body>
</html>
